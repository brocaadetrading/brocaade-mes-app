<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brocaade MES - Manufacturing Execution System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>

    <script>
        // ============================================================================
        // CONFIGURATION - CHANGE THIS TO YOUR BACKEND URL
        // ============================================================================
        const API_URL = 'https://brocaade-mes.vercel.app';
        
        // ============================================================================
        // STORAGE KEYS
        // ============================================================================
        const TOKEN_KEY = 'brocaade_token';
        const USER_KEY = 'brocaade_user';

        // ============================================================================
        // GLOBAL STATE
        // ============================================================================
        let currentUser = null;
        let currentPage = 'login';
        let projects = [];
        let jobSheets = [];
        let dashboardData = null;

        // ============================================================================
        // AUTHENTICATION FUNCTIONS
        // ============================================================================

        async function login(email, password) {
            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                
                if (response.ok && data.token) {
                    localStorage.setItem(TOKEN_KEY, data.token);
                    localStorage.setItem(USER_KEY, JSON.stringify(data.user));
                    currentUser = data.user;
                    currentPage = 'dashboard';
                    render();
                } else {
                    showError('Login failed: ' + (data.error || 'Invalid credentials'));
                }
            } catch (error) {
                showError('Connection error: ' + error.message);
            }
        }

        function logout() {
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(USER_KEY);
            currentUser = null;
            currentPage = 'login';
            render();
        }

        // ============================================================================
        // API FUNCTIONS
        // ============================================================================

        async function apiCall(endpoint, options = {}) {
            const token = localStorage.getItem(TOKEN_KEY);
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };

            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    ...options,
                    headers
                });
                return await response.json();
            } catch (error) {
                return { error: error.message };
            }
        }

        async function loadDashboard() {
            if (currentUser.role === 'owner') {
                dashboardData = await apiCall('/api/owner/dashboard-summary');
            } else {
                dashboardData = null;
            }
        }

        async function loadProjects() {
            const data = await apiCall('/api/projects');
            projects = Array.isArray(data) ? data : [];
        }

        async function loadJobSheets() {
            const data = await apiCall('/api/job-sheets');
            jobSheets = Array.isArray(data) ? data : [];
        }

        // ============================================================================
        // UI HELPER FUNCTIONS
        // ============================================================================

        function showError(message) {
            alert(message);
        }

        function showLoader() {
            return '<div class="flex justify-center items-center h-64"><div class="loader"></div><span class="ml-4 text-gray-600">Loading...</span></div>';
        }

        // ============================================================================
        // RENDER PAGES
        // ============================================================================

        function renderLoginPage() {
            return `
                <div class="min-h-screen bg-gradient-to-br from-blue-600 to-purple-700 flex items-center justify-center px-4">
                    <div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-md">
                        <div class="text-center mb-8">
                            <h1 class="text-4xl font-bold text-gray-800">Brocaade</h1>
                            <p class="text-gray-600 mt-2">Manufacturing Execution System</p>
                        </div>

                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                                <input type="email" id="email" placeholder="your@email.com" 
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" 
                                    value="owner@brocaade.com">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                                <input type="password" id="password" placeholder="••••••••" 
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" 
                                    value="SecurePass123!">
                            </div>
                            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                                Sign In
                            </button>
                        </div>

                        <div class="mt-8 bg-blue-50 p-4 rounded-lg">
                            <p class="text-xs font-semibold text-gray-700 mb-2">DEMO CREDENTIALS:</p>
                            <div class="text-xs text-gray-600 space-y-1">
                                <p><strong>Owner:</strong> owner@brocaade.com</p>
                                <p><strong>Design:</strong> design@brocaade.com</p>
                                <p><strong>Manager:</strong> manager@brocaade.com</p>
                                <p><strong>Contractor:</strong> contractor@brocaade.com</p>
                                <p><strong>Password:</strong> SecurePass123!</p>
                            </div>
                        </div>

                        <p class="text-center text-xs text-gray-500 mt-6">Backend: ${API_URL}</p>
                    </div>
                </div>
            `;
        }

        function renderDashboard() {
            return `
                <div class="min-h-screen bg-gray-100">
                    <!-- Header -->
                    <div class="bg-white shadow">
                        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                            <h1 class="text-2xl font-bold text-gray-800">Brocaade MES</h1>
                            <div class="flex items-center space-x-4">
                                <span class="text-gray-600 text-sm">${currentUser.email}</span>
                                <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 text-sm">Logout</button>
                            </div>
                        </div>
                    </div>

                    <!-- Main Content -->
                    <div class="max-w-7xl mx-auto px-6 py-8">
                        <h2 class="text-3xl font-bold text-gray-800 mb-6">${currentUser.role.toUpperCase()} Dashboard</h2>

                        <!-- Tabs -->
                        <div class="flex space-x-2 mb-6 border-b border-gray-300">
                            <button onclick="switchTab('overview')" class="px-6 py-3 border-b-2 border-blue-600 text-blue-600 font-semibold">Overview</button>
                            <button onclick="switchTab('projects')" class="px-6 py-3 text-gray-600 hover:text-gray-800">Projects</button>
                            <button onclick="switchTab('jobs')" class="px-6 py-3 text-gray-600 hover:text-gray-800">Jobs</button>
                        </div>

                        <!-- Overview Tab -->
                        <div id="tab-overview" class="space-y-6">
                            ${renderOverviewTab()}
                        </div>

                        <!-- Projects Tab -->
                        <div id="tab-projects" class="hidden space-y-6">
                            ${showLoader()}
                        </div>

                        <!-- Jobs Tab -->
                        <div id="tab-jobs" class="hidden space-y-6">
                            ${showLoader()}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderOverviewTab() {
            if (!dashboardData || !dashboardData.active_jobs) {
                return showLoader();
            }

            return `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-600">
                        <p class="text-gray-600 text-sm">Active Jobs</p>
                        <p class="text-3xl font-bold text-blue-600 mt-2">${dashboardData.active_jobs || 0}</p>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-green-600">
                        <p class="text-gray-600 text-sm">Pipeline Value</p>
                        <p class="text-3xl font-bold text-green-600 mt-2">₹${(dashboardData.pipeline_value || 0).toLocaleString()}</p>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-orange-600">
                        <p class="text-gray-600 text-sm">Outstanding</p>
                        <p class="text-3xl font-bold text-orange-600 mt-2">₹${(dashboardData.total_outstanding_liabilities || 0).toLocaleString()}</p>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-purple-600">
                        <p class="text-gray-600 text-sm">Pending COD</p>
                        <p class="text-3xl font-bold text-purple-600 mt-2">₹${(dashboardData.pending_cod_value || 0).toLocaleString()}</p>
                    </div>
                </div>
            `;
        }

        function renderProjectsTab() {
            if (projects.length === 0) {
                return '<p class="text-center text-gray-600 py-8">No projects found</p>';
            }

            return `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${projects.map(p => `
                        <div class="bg-white p-6 rounded-lg shadow">
                            <h3 class="text-lg font-bold text-gray-800">${p.project_name}</h3>
                            <p class="text-gray-600 text-sm mt-2">Type: ${p.project_type}</p>
                            <p class="text-gray-600 text-sm">Client: ${p.client_name}</p>
                            <p class="text-gray-600 text-sm">Budget: ₹${(p.budget_amount || 0).toLocaleString()}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderJobsTab() {
            if (jobSheets.length === 0) {
                return '<p class="text-center text-gray-600 py-8">No jobs found</p>';
            }

            return `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${jobSheets.map(j => `
                        <div class="bg-white p-6 rounded-lg shadow">
                            <p class="text-xs text-gray-500">${j.job_number}</p>
                            <h3 class="text-lg font-bold text-gray-800 mt-1">${j.job_type}</h3>
                            <p class="text-gray-600 text-sm mt-2">Status: <span class="font-semibold">${j.status}</span></p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ============================================================================
        // TAB SWITCHING
        // ============================================================================

        async function switchTab(tab) {
            document.getElementById('tab-overview').classList.add('hidden');
            document.getElementById('tab-projects').classList.add('hidden');
            document.getElementById('tab-jobs').classList.add('hidden');

            if (tab === 'overview') {
                document.getElementById('tab-overview').classList.remove('hidden');
                await loadDashboard();
                document.getElementById('tab-overview').innerHTML = renderOverviewTab();
            } else if (tab === 'projects') {
                document.getElementById('tab-projects').classList.remove('hidden');
                await loadProjects();
                document.getElementById('tab-projects').innerHTML = renderProjectsTab();
            } else if (tab === 'jobs') {
                document.getElementById('tab-jobs').classList.remove('hidden');
                await loadJobSheets();
                document.getElementById('tab-jobs').innerHTML = renderJobsTab();
            }
        }

        // ============================================================================
        // EVENT HANDLERS
        // ============================================================================

        function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showError('Please enter email and password');
                return;
            }
            
            login(email, password);
        }

        // ============================================================================
        // MAIN RENDER
        // ============================================================================

        function render() {
            const app = document.getElementById('app');
            
            if (!currentUser) {
                app.innerHTML = renderLoginPage();
            } else {
                app.innerHTML = renderDashboard();
                loadDashboard();
            }
        }

        // ============================================================================
        // INITIALIZATION
        // ============================================================================

        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem(TOKEN_KEY);
            const user = localStorage.getItem(USER_KEY);
            
            if (token && user) {
                try {
                    currentUser = JSON.parse(user);
                } catch (e) {
                    localStorage.removeItem(TOKEN_KEY);
                    localStorage.removeItem(USER_KEY);
                }
            }
            
            render();
        });

        // Allow Enter key to login
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !currentUser) {
                handleLogin();
            }
        });
    </script>
</body>
</html>
